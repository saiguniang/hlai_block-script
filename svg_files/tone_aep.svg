  <desc>Hlai Block-Script / 方块黎文</desc>
  <!-- 
  *************************************************************************
  [ PROJECT: HLAI BLOCK-SCRIPT ][ LICENSE: CC0 1.0 Universal (Public Domain) ]
  
  * ENGLISH DECLARATION *
  This scalable vector graphic (SVG) is a core component of a custom 
  typography system designed specifically for the Hlai language (a Kra-Dai 
  endangered language native to Hainan, China). 
  
  It reconstructs the 1957 Latin-based Hlai orthography into a block-style 
  syllabary, fusing precision with the visual aesthetics of ancient Han 
  scripts (such as the Bird-Worm Seal Script and Qin Dynasty Small Seal Script).
  
  No rights reserved. Anyone is free to copy, modify, distribute, or 
  perform the work, even for commercial purposes. 
  
  May the ancient voices of the Eastern be remembered in the digital age.
  
  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  * 普通话（标准中文）宣言 *
  📜 方块黎文
  本矢量字符专为中国海南省濒危少数民族语言「黎语」量身定制。
  线条美学致敬中国先秦鸟虫篆与秦代小篆，结合方块音节逻辑重构。
  
  完全开源，放弃版权。愿古老的东方语言，在数字时代以最美的姿态被铭记。
  *************************************************************************
